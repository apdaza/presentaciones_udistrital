      # Introducción componentes
      
      ---
      layout: false
      # Componentes en Arquitectura de Software

      ## 1. **Concepto de Componente**

      Un **componente** es una **unidad modular de software** que:

      * Encapsula lógica, datos o ambos.
      * Expone **interfaces bien definidas** para que otros componentes interactúen con él.
      * Puede ser desarrollado, probado, desplegado y mantenido **de forma independiente**.

      En términos prácticos:

      * Es más grande y abstraído que una clase.
      * Enfoca su diseño en **reutilización, independencia, cohesión alta y bajo acoplamiento**.
      * Puede representar módulos como: *servicios, librerías, microservicios, plug-ins, módulos de UI, componentes web*.

      ---
      **Características clave:**

      * **Encapsulación**: oculta detalles internos.
      * **Interfaces**: contrato de uso claro y estable.
      * **Reemplazabilidad**: un componente puede cambiarse sin afectar el sistema.
      * **Reusabilidad**: se reusa en diferentes sistemas o contextos.

      ---

      ## 2. **Diseño de Componentes**

      El diseño de componentes se centra en cómo deben estructurarse para ser:

      * **Robustos**
      * **Extensibles**
      * **Fácilmente integrables**
      * **Escalables**

      Principios fundamentales:

      * **Alta cohesión interna**: un componente debe tener un propósito claro.
      * **Bajo acoplamiento**: debe depender de la menor cantidad posible de otros componentes.
      * **Interfaces estables**: deben cambiar muy poco a lo largo del tiempo.
      * **Inversión de dependencias (DIP)**: preferir interfaces y abstracciones.
      * **Diseño orientado a contratos**: qué ofrece y qué requiere el componente.

      ---
      En la práctica:

      * Definir interfaces (API, endpoints, puertos).
      * Modelar componentes usando UML (diagramas de componentes).
      * Establecer fronteras claras de responsabilidad.
      * Diseñar componentes para permitir pruebas unitarias y mockeo.

      ---
      ## 3. **Tipos de Componentes**

      Según su propósito y nivel en el sistema:

      ### **a) Componentes de Presentación**

      * Manejan interacción con el usuario.
      * Ejemplo: componentes UI en React, Angular, Flutter.

      ### **b) Componentes de Lógica de Negocio**

      * Implementan reglas, cálculos y procesos del dominio.
      * Ejemplo: módulos de gestión de matrículas, nómina, inventario.

      ### **c) Componentes de Datos**

      * Acceden a bases de datos, repositorios, servicios externos.
      * Ejemplo: Repositorios, DAO, microservicio de datos.

      ---

      ### **d) Componentes de Integración**

      * Facilitan comunicación entre sistemas.
      * Ejemplo: adaptadores, colas, APIs Gateway.

      ### **e) Componentes Infraestructurales**

      * Proveen servicios de soporte: seguridad, logging, métricas.

      ### **f) Componentes de Microservicio**

      * Componentes autónomos desplegables de forma independiente.

      Cada tipo se ubica dentro de una arquitectura por capas o hexagonal.

      ---

      ## 4. **Evolución de Clases a Componentes**

      Este punto explica cómo, al aumentar la complejidad del software, se pasa de clases individuales a componentes más grandes:

      ### **Etapa 1: Clases**

      * Representan entidades pequeñas: lógica, atributos y métodos.
      * Gran número de clases genera complejidad.

      ### **Etapa 2: Paquetes o Módulos**

      * Agrupan clases relacionadas.
      * Organizan el proyecto pero no son unidades independientes.

      ---
      ### **Etapa 3: Componentes**

      * Se agrupan clases y módulos para formar una **unidad funcional** completa.
      * Se define una interfaz y un contrato de entrada/salida.
      * El interior queda oculto.
      * Cada componente puede tener:

        * Su propio repositorio
        * Su ciclo de vida de despliegue
        * Su entorno tecnológico

      ### **Etapa 4: Sistemas basados en componentes / Microservicios**

      * Cada componente puede evolucionar a un servicio autónomo.

      **Ejemplo:**
      >> Clases → módulo de autenticación → componente de autenticación → servicio de autenticación.

      ---

      ## 5. **Construcción de Componentes**

      La construcción implica desarrollar e integrar los componentes siguiendo buenas prácticas:

      ### **a) Definir la interfaz**

      * Qué métodos, responsabilidades y contratos ofrecerá.

      ### **b) Implementar la lógica interna**

      * Encapsular clases, módulos, patrones de diseño.
      * Cumplir principios SOLID.

      ### **c) Controlar dependencias**

      * Usar inyección de dependencias.
      * Evitar dependencias circulares.

      ---
      ### **d) Versionamiento y empaquetado**

      * El componente debe ser empaquetado como artefacto:

        * .jar, .dll, contenedor Docker, paquete npm, PyPI, etc.

      ### **e) Pruebas y aseguramiento de calidad**

      * Pruebas unitarias e integración.
      * Mocking de dependencias.
      * Tests de contrato.

      ### **f) Documentación**

      * API
      * Diagramas de componentes
      * Manual de despliegue

      ---
      ### **g) Despliegue**

      * Integración continua (CI/CD)
      * Contenedores, orquestación (Docker/Kubernetes)
      * Publicación en repositorios internos

      ---
      # 6. Principios de Diseño de Componentes
      ✅ **1. Alta Cohesión**

      Un componente debe encargarse de una única responsabilidad funcional.
      Relacionado directamente con el principio **S (Single Responsibility)** de SOLID.

      ✅ **2. Bajo Acoplamiento**

      El componente ideal depende lo menos posible de otros.
      Relaciona con el principio **D (Dependency Inversion)** y **O (Open/Closed)**.

      ✅ **3. Interfaces Claras y Estables**

      Los detalles internos pueden cambiar, pero las interfaces públicas no deben romperse.
      Conecta con Interface **Segregation Principle (ISP)**.

      ✅ **4. Reemplazabilidad**

      Un componente debe poder sustituirse por otro equivalente.
      Apoyado por **DIP**, uso de **abstracciones** y **contratos**.

      ---
      ✅ **5. Encapsulamiento**

      El cliente solo conoce las interfaces del componente, no su implementación.
      Conecta con OOP: **encapsulación** y **modularidad**.

      ✅ **6. Independencia de Despliegue**

      Idealmente, cada componente se puede versionar, probar y desplegar por separado.
      Relacionado con **microservicios** o **módulos independientes**.

      ---
      ## Relación entre los Principios de Componentes y SOLID

      | Principio del Componente | Relación SOLID | Explicación                                                     |
      | ------------------------ | -------------- | --------------------------------------------------------------- |
      | Alta cohesión            | SRP            | Cada componente debe tener una única responsabilidad funcional. |
      | Bajo acoplamiento        | DIP            | Las dependencias deben ser invertidas y abstractas.             |
      | Interfaces claras        | ISP            | Interfaces pequeñas, específicas y estables.                    |
      | Estabilidad              | OCP            | Componentes extensibles sin modificación interna.               |
      | Reemplazabilidad         | LSP            | Sustituir implementaciones sin romper clientes.                 |
      | Encapsulamiento          | OO + SRP       | Internos ocultos; solo exponer una interfaz pública.            |

      ---
      # 7. Conclusiones

      Los componentes bien diseñados no son solo modularidad:
      son una aplicación práctica de los principios de diseño profesional.

      Un componente ideal:

      - Encapsula funcionalidad coherente.

      - Se comunica por interfaces estables.

      - Es intercambiable y extensible.

      - Se prueba y despliega de manera independiente.

      - Cumple SOLID de manera natural.
