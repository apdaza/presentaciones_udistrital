# ¿Por qué una política institucional de IA?

>> La Inteligencia Artificial ya está presente en actividades de docencia, investigación, gestión administrativa, analítica institucional, desarrollo tecnológico y atención a usuarios.

La Universidad requiere **reglas claras** para habilitar la innovación sin comprometer derechos, datos personales, integridad académica, seguridad de la información ni responsabilidad pública.

???
La Universidad Distrital Francisco José de Caldas, en cumplimiento de su misión, debe adoptar unos lineamientos que permitan orientar el uso **responsable** de sistemas de Inteligencia Artificial, *incluida la Inteligencia Artificial Generativa*, en actividades **académicas**, **investigativas**, **administrativas**, **contractuales**, **tecnológicas** y de **extensión**.

Dichos lineamientos deben promover: 
- la innovación
- la eficiencia institucional
- la calidad académica
- la transformación digital 
- y la generación de conocimiento

garantizando al mismo tiempo: 
- la protección de derechos fundamentales
- la autonomía universitaria
- la integridad académica
- la seguridad de la información
- la protección de datos personales
- la transparencia
- la supervisión humana 
- y la responsabilidad institucional.


---
class: section

# Propósito general

## Objetivo
Establecer lineamientos para el uso **responsable, ético, seguro, transparente y verificable** de herramientas y sistemas de IA en la Universidad Distrital.

## Resultado esperado
Una base institucional para regular IA en:
- Docencia y aprendizaje
- Investigación
- Gestión administrativa
- Contratación tecnológica
- Analítica institucional
- Seguridad y protección de datos

???
## Objetivo
Establecer lineamientos institucionales para el uso **responsable, ético, seguro, transparente y verificable** de herramientas y sistemas de Inteligencia Artificial en la Universidad Distrital Francisco José de Caldas, definiendo:
- principios, 
- responsabilidades, 
- usos permitidos, 
- usos condicionados, 
- usos prohibidos, 
- medidas de protección de datos, 
- criterios de integridad académica, 
- gestión de riesgos, 
- supervisión humana 
- y mecanismos de seguimiento.

# Fundamento normativo principal

| Nivel | Fuente | Aporte para la Universidad |
|---|---|---|
| Nacional | CONPES 4144 de 2025 | Política Nacional de Inteligencia Artificial. |
| Nacional | Circular Externa SIC 002 de 2024 | Tratamiento de datos personales en sistemas de IA. |
| Nacional | Ley 1581 de 2012 | Régimen general de protección de datos personales. |
| *Nacional* | *Lineamientos para el uso de IA* | *Borrador de la comisión técnica del SUE*. |
| Técnico | Lineamientos MinTIC 2026 | Seguridad y privacidad para sistemas de IA en entidades públicas. |
| Distrital | Acuerdo Distrital 1017 de 2025 | Ordena lineamientos para uso responsable y ético de IA en Bogotá. |
| Distrital | Acuerdo 003 de 2025 | Define estándares para preparación, desarrollo, implementación, supervisión y mejora de sistemas de IA en entidades distritales. |

# Principios rectores

| Principio | Enfoque institucional |
|---|---|
| Legalidad | Uso conforme a la ley y normativa interna. |
| Finalidad legítima | IA para fines misionales, necesarios y proporcionales. |
| Supervisión humana | Ninguna decisión crítica sin revisión competente. |
| Transparencia | Declarar cuándo se usa IA y con qué propósito. |
| Responsabilidad | El usuario responde por verificar y validar resultados. |
| Protección de datos | No ingresar información sensible o reservada en herramientas no autorizadas. |
| Seguridad | Control de acceso, trazabilidad, continuidad y gestión de incidentes. |
| Integridad académica | No puede usarse para suplantar autorías, falsificar evidencias, etc.|
| Equidad | Evaluación de sesgos, discriminación e impactos diferenciales. |

???
## Principios institucionales
- **Legalidad:** Todo uso de IA en la Universidad deberá sujetarse a la Constitución, la ley, la normativa nacional, distrital e institucional aplicable, especialmente en protección de datos personales, propiedad intelectual, transparencia, acceso a la información pública, contratación pública, archivo, seguridad digital, integridad académica y responsabilidad disciplinaria.
- **Finalidad legítima:** La IA deberá utilizarse para fines legítimos, explícitos, necesarios y proporcionales a la misión universitaria, tales como mejorar la calidad académica, fortalecer la investigación, optimizar procesos administrativos, apoyar la toma de decisiones, ampliar el acceso al conocimiento y mejorar la atención a la comunidad.
- **Supervisión humana:** Ningún sistema de IA podrá reemplazar la responsabilidad de autoridades académicas, administrativas, docentes, evaluadores, investigadores, ordenadores del gasto o servidores públicos. Toda decisión con efectos académicos, administrativos, disciplinarios, contractuales, laborales o financieros deberá contar con intervención, revisión y responsabilidad humana.
- **Transparencia y explicabilidad:** Los usuarios deberán informar de manera clara cuándo se ha utilizado IA en actividades académicas, investigativas o administrativas, especialmente cuando su uso incida en productos evaluables, informes oficiales, decisiones institucionales, contenidos públicos, análisis de datos o atención a usuarios.
- **Responsabilidad:** La persona que utilice IA será responsable de verificar la exactitud, pertinencia, legalidad, integridad, actualidad y calidad de los resultados generados. El uso de IA no exime de responsabilidad académica, administrativa, contractual, ética, disciplinaria o legal.
- **Protección de datos personales:** No se deberán ingresar datos personales, datos sensibles, información reservada, información clasificada, expedientes, historias académicas, datos financieros, datos contractuales, información disciplinaria, información de salud, credenciales, secretos institucionales o documentos internos en herramientas públicas de IA, salvo que exista autorización institucional expresa y análisis de riesgo.
- **Seguridad de la información:** Todo sistema de IA institucional deberá cumplir controles de confidencialidad, integridad, disponibilidad, autenticación, autorización, trazabilidad, gestión de vulnerabilidades, monitoreo, respaldo, continuidad, gestión de incidentes y protección frente a ataques adversariales o fuga de información.
- **Integridad académica:** La IA podrá apoyar el aprendizaje, la investigación, la escritura, la programación, la traducción, el análisis y la creación, pero no podrá utilizarse para suplantar autoría, evadir evaluaciones, fabricar evidencias, falsificar resultados, copiar trabajos, manipular datos o incumplir reglas definidas por el docente o la Universidad.
- **Equidad, inclusión y no discriminación:** Los sistemas de IA deberán evaluarse frente a sesgos, discriminación, exclusión, barreras de accesibilidad, impactos diferenciales y riesgos para poblaciones vulnerables.
- **Trazabilidad y auditabilidad:** Los sistemas institucionales de IA deberán dejar evidencia de diseño, propósito, fuentes de datos, responsables, versiones, pruebas, resultados, limitaciones, validaciones, incidentes, decisiones asistidas y medidas de mitigación.
- **Proporcionalidad:** La Universidad deberá preferir soluciones menos invasivas, más seguras y más explicables cuando permitan alcanzar el mismo objetivo institucional.
- **Autonomía universitaria y libertad académica responsable:** El uso de IA deberá respetar la autonomía universitaria, la libertad de cátedra, la libertad de investigación y la diversidad pedagógica, dentro de los límites de la ley, la ética académica y la protección de derechos.

# Gobernanza de IA

- La adopción de IA debe gestionarse como un asunto institucional, no como un uso aislado por dependencia o por usuario.
- El rol de un **Comité Institucional de Gobernanza de IA** se sugiere asignarlo al **Comité de Transformación Digital** integrando participantes como:
 - Vicerrectorías o delegados
 - Oficina Jurídica
 - Representantes académicos

## Funciones principales a integrar
- Actualizar la política de IA
- Aprobar lineamientos técnicos y éticos
- Revisar proyectos de alto impacto
- Mantener inventario de sistemas de IA
- Definir metodología de evaluación de impacto
- Promover formación institucional

---
class: section
# Inventario institucional de sistemas de IA

Toda solución institucional de IA debe registrarse con información mínima:

| Campo | Descripción |
|---|---|
| Sistema o herramienta | Nombre y tipo de solución. |
| Dependencia responsable | Área funcional y técnica. |
| Finalidad | Problema que atiende y proceso asociado. |
| Datos tratados | Tipo de datos y nivel de sensibilidad. |
| Riesgo | Bajo, medio, alto o crítico. |
| Proveedor o desarrollador | Interno, externo o mixto. |
| Modelo de despliegue | Local, nube, híbrido o externo. |
| Estado | Piloto, producción, suspendido o retirado. |

class: section

# Clasificación de usos de IA

No todo uso de IA tiene el mismo nivel de riesgo. La Universidad debe distinguir usos permitidos, condicionados y prohibidos.

## Usos permitidos de bajo riesgo

Se permiten cuando no involucran datos personales, información reservada ni decisiones sensibles:

- Lluvia de ideas y estructuración de contenidos.
- Resúmenes, mapas conceptuales y esquemas preliminares.
- Corrección de estilo, ortografía y traducción.
- Apoyo a programación, documentación y depuración de código.
- Creación preliminar de materiales didácticos.
- Generación de ejemplos, ejercicios o simulaciones.
- Apoyo en accesibilidad: subtítulos, lectura asistida o simplificación de textos.

---
class: section

# Clasificación de usos de IA

## Usos permitidos con declaración

Se permite el uso de IA cuando se declare expresamente y exista revisión humana en:

- Trabajos académicos autorizados por el docente.
- Informes, presentaciones o piezas comunicativas.
- Apoyo en investigación.
- Generación de código o prototipos.
- Borradores administrativos o jurídicos.
- Análisis exploratorio con información pública o anonimizada.

### Declaración mínima
Herramienta usada · Propósito · Tipo de apoyo · Fecha · Validación humana realizada

---

class: section

# Clasificación de usos de IA
## Usos condicionados a evaluación previa

Requieren concepto técnico, jurídico, de protección de datos y/o revisión del Comité:

- Tratamiento de datos personales o sensibles.
- Apoyo a decisiones sobre estudiantes, docentes, funcionarios o contratistas.
- Analítica predictiva de permanencia, deserción, rendimiento o bienestar.
- Clasificación, priorización o recomendación de personas.
- Sistemas en contratación, finanzas o supervisión contractual.
- Reconocimiento facial, biometría, vigilancia o monitoreo automatizado.
- Sistemas conectados a bases de datos institucionales.

---
class: section

# Clasificación de usos de IA

## Usos prohibidos

Queda prohibido:

- Ingresar datos sensibles, expedientes, credenciales o información reservada en herramientas públicas no autorizadas.
- Presentar como propio trabajo generado sustancialmente por IA sin autorización o declaración.
- Fabricar citas, fuentes, evidencias, resultados o documentos oficiales.
- Tomar decisiones automáticas sin intervención humana en procesos de alto impacto.
- Usar IA para discriminar, vigilar sin autorización o manipular personas.
- Desplegar sistemas institucionales sin evaluación técnica, jurídica, ética y de seguridad.

---
class: section

# Lineamientos para docencia y aprendizaje

El uso de IA debe fortalecer el aprendizaje, no sustituir la autoría, el razonamiento ni la evaluación académica.

## Reglas para asignaturas

**El docente define el nivel de uso**
1. No permitido.
2. Permitido solo como apoyo preliminar.
3. Permitido con declaración obligatoria.
4. Permitido como parte de la actividad académica.
5. Requerido para desarrollar competencias específicas.

**Ejemplo de declaración de uso de IA por parte del estudiante**
>> Para la elaboración de este trabajo utilicé herramientas de Inteligencia Artificial como apoyo en [redacción / traducción / estructura / generación de ideas / revisión de código / análisis preliminar]. El contenido final fue revisado, ajustado y validado por mí, y asumo responsabilidad por su exactitud, originalidad y pertinencia


???
**Autonomía docente con reglas explícitas:**

- Cada docente deberá definir en el programa de asignatura, aula virtual o guía de evaluación las reglas de uso de IA aplicables al curso. 
- La regla debe ser comprensible para el estudiante y coherente con los resultados de aprendizaje y no ire n contravía con lo aquí dispuesto o lo dispuesto en normas institucionales.

---
class: section

# Lineamientos para docencia y aprendizaje

## Evaluación recomendada
- Evidencia de proceso
- Sustentación oral
- Bitácoras y versiones intermedias
- Resolución contextualizada de problemas
- Pensamiento crítico
- Validación de fuentes
- Defensa del trabajo realizado


Los **detectores automáticos de IA** no deben ser prueba única ni concluyente por sus limitaciones técnicas y riesgo de falsos positivos o falsos negativos.
???
- Los docentes deberán privilegiar estrategias de evaluación que valoren proceso, argumentación, pensamiento crítico, sustentación oral, resolución contextualizada de problemas, trazabilidad del trabajo, bitácoras, versiones intermedias, ejercicios en clase y defensa de resultados.
- No se recomienda fundamentar decisiones disciplinarias únicamente en detectores automáticos de IA debido a sus limitaciones técnicas, falsos positivos y falsos negativos. Su uso, si se realiza, deberá ser auxiliar, no concluyente, y deberá garantizar debido proceso académico.

---
class: section

# Lineamientos para docencia y aprendizaje

## Integridad académica

El uso de IA puede constituir falta académica cuando implique:

- Suplantación de autoría.
- Plagio o entrega de productos generados sin declaración.
- Manipulación de evidencias.
- Fabricación de datos, citas o fuentes.
- Incumplimiento de reglas definidas por el docente.

---
class: section

# Lineamientos para investigación

La IA puede apoyar la investigación, siempre que se preserve la responsabilidad científica, ética y metodológica del equipo investigador.

## Investigación responsable con IA

Usos admisibles:

- Revisión de literatura.
- Análisis exploratorio.
- Programación y procesamiento de datos.
- Procesamiento de lenguaje natural.
- Visualización y simulación.
- Traducción y edición de estilo.
- Generación de hipótesis preliminares.

---
class: section

# Lineamientos para investigación
## Investigación responsable con IA

Condiciones mínimas:

- Declarar el uso significativo de IA.
- No atribuir autoría a herramientas de IA.
- Documentar herramienta, versión, parámetros y validación.
- Proteger datos personales, sensibles o de comunidades.

---
class: section

# Lineamientos para gestión administrativa

La IA puede apoyar procesos administrativos, pero no reemplaza la competencia funcional ni la responsabilidad del servidor, contratista o autoridad universitaria.

## Gestión administrativa y atención a usuarios

Aplicaciones posibles:

- Borradores de comunicaciones e informes.
- Clasificación documental y apoyo en metadatos.
- Resúmenes de información institucional.
- Tableros y analítica institucional.
- Automatización de tareas repetitivas.
- Chatbots y asistentes virtuales con escalamiento humano.

Regla central: todo documento oficial generado con apoyo de IA debe ser revisado antes de su firma, radicación, publicación o envío.

---
class: section

# Protección de datos y seguridad de la información

El uso de IA no puede debilitar el régimen de protección de datos ni los controles de seguridad digital de la Universidad.

## Reglas de datos personales

La Universidad debe garantizar:

- Finalidad clara y legítima.
- Minimización de datos.
- Autorización o base jurídica aplicable.
- Protección reforzada de datos sensibles.
- Anonimización o seudonimización cuando sea posible.
- Verificación de transferencias o transmisiones a terceros.
- Revisión de condiciones de proveedores externos.
- Registro y gestión de incidentes.

Regla práctica: No cargar información institucional sensible en herramientas públicas de IA sin autorización formal y análisis de riesgo.

---
class: section

# Contratación y adquisición de soluciones de IA

Toda adquisición o desarrollo de IA debe pasar por evaluación funcional, técnica, jurídica, ética y de seguridad.

## Cláusulas mínimas en contratos de IA

Los contratos deben incluir, según aplique:

- Confidencialidad y reserva.
- Prohibición de entrenamiento con datos institucionales sin autorización.
- Cumplimiento de protección de datos personales.
- Medidas de seguridad técnica y organizacional.
- Trazabilidad, auditoría y acceso a logs.
- Propiedad intelectual de desarrollos, datos, prompts y configuraciones.
- Portabilidad, interoperabilidad y reversibilidad.
- Ubicación y transferencia internacional de datos.
- Gestión de incidentes.
- Explicabilidad, documentación técnica y pruebas de sesgo.

---
class: section

# Gestión de riesgos y evaluación de impacto algorítmico

Los sistemas de IA deben clasificarse según su impacto y someterse a controles proporcionales al riesgo.

## Clasificación de riesgo

| Nivel | Descripción |
|---|---|
| Bajo | Apoyo individual sin datos personales ni impacto decisorio. |
| Medio | Procesos internos con información institucional o datos personales no sensibles. |
| Alto | Impacto en derechos, evaluación, contratación, bienestar, recursos públicos o datos sensibles. |
| Crítico | Vigilancia, biometría, decisiones automatizadas de alto impacto o tratamiento masivo de datos sensibles. |

Los sistemas de riesgo medio, alto o crítico requieren evaluación de impacto algorítmico.

---
class: section
# Evaluación de impacto algorítmico

Debe analizar como mínimo:

- Finalidad, necesidad y proporcionalidad.
- Calidad y representatividad de datos.
- Sesgos potenciales.
- Impacto en derechos.
- Explicabilidad.
- Seguridad.
- Riesgos de error o discriminación.
- Supervisión humana.
- Medidas de mitigación.
- Plan de monitoreo.
- Procedimiento de reclamación o revisión humana.

---
class: section

# Implementación institucional

La política debe desplegarse de manera progresiva, con acciones de transición, formación, control y mejora continua.

## Ruta de implementación

| Fase | Acciones principales |
|---|---|
| **Sensibilización** | Socialización, Comité de Transformación Digital (Comité de IA), inventario inicial, guías básicas y restricciones sobre datos sensibles. |
| **Implementación** | Registro formal de sistemas, evaluación de impacto, reglas en asignaturas, capacitación y revisión contractual. |
| **Madurez** | Auditorías, indicadores, actualización normativa, IA local o privada, integración con gobierno de datos y seguridad digital. |

---
class: section

# Implementación institucional

## Indicadores de seguimiento

- Herramientas de IA inventariadas.
- Proyectos de IA evaluados.
- Docentes y estudiantes capacitados.
- Asignaturas con reglas explícitas de uso de IA.
- Evaluaciones de impacto realizadas.
- Incidentes reportados y gestionados.
- Contratos tecnológicos con cláusulas de IA.
- Sistemas con monitoreo activo.
- Proyectos de investigación que declaran uso de IA.
- Herramientas institucionales autorizadas.
